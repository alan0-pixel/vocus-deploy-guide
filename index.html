<!doctype html>
<html lang="zh-Hant">

    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f2;
        --surface: #ffffff;
        --text: #1d1f1f;
        --muted: #5c6468;
        --accent: #0b6bcb;
        --accent-hover: #084f99;
        --border: #d9dedb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 18px;
      }

      article {
        width: min(100%, 720px);
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        padding: clamp(24px, 5vw, 48px);
        box-shadow: 0 16px 36px rgb(29 31 31 / 8%);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.92rem;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 3.2rem);
        line-height: 1.15;
        letter-spacing: 0;
      }

      .meta,
      .note {
        color: var(--muted);
      }

      .meta {
        margin: 18px 0 0;
      }

      .summary {
        margin: 28px 0 0;
        font-size: 1.05rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 32px;
      }

      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        font-weight: 700;
        padding: 10px 18px;
        text-decoration: none;
      }

      a.button:hover,
      a.button:focus-visible {
        background: var(--accent-hover);
      }

      a.secondary {
        color: var(--accent);
        font-weight: 700;
        text-underline-offset: 3px;
      }

      .note {
        border-top: 1px solid var(--border);
        margin-top: 32px;
        padding-top: 18px;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>

        </p>
        <div class="actions" aria-label="閱讀連結">
          <a
            class="button"
